<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Módulo IA</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: #f4f6f9; display: flex; flex-direction: column; font-family: Arial, Helvetica, sans-serif; }
        .navbar { background: #1a2b4a; display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px; }
        .navbar-logo { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .navbar-sep { color: rgba(255,255,255,0.3); }
        .navbar-role { color: rgba(255,255,255,0.6); font-size: 0.85rem; }
        .content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .card { background: #fff; border-radius: 12px; border: 0.5px solid #dde1e9; padding: 48px 40px; width: min(92vw, 480px); text-align: center; }
        .card-icon { width: 56px; height: 56px; border-radius: 12px; background: #eef2fa; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .card h1 { font-size: 1.3rem; font-weight: 600; color: #1a2b4a; margin-bottom: 8px; }
        .card p { font-size: 0.9rem; color: #6b7280; line-height: 1.6; margin-bottom: 32px; }
        .btn { appearance: none; border: 0; border-radius: 8px; padding: 12px 28px; font-size: 0.92rem; font-weight: 600; color: #fff; background: #1a2b4a; cursor: pointer; transition: background 0.15s ease, transform 0.15s ease; }
        .btn:hover { background: #243560; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .status { margin-top: 20px; min-height: 1.2rem; font-size: 0.85rem; color: #16a34a; font-weight: 500; }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="navbar-logo">BOCAR</span>
        <span class="navbar-sep">|</span>
        <span class="navbar-role">Sistemas</span>
    </nav>
    <div class="content">
        <div class="card">
            <div class="card-icon">
                <i class="ti ti-brain" style="font-size:28px; color:#1a2b4a;"></i>
            </div>
            <h1>Módulo IA</h1>
            <p>Presiona el botón para solicitar el reentrenamiento del modelo.</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn">Reentrenar modelo</button>
            </form>
            <div class="status">
                {% if reentrenamiento_solicitado %}
                    Reentrenamiento solicitado.
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
